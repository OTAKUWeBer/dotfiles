# Font settings
font_family      CaskaydiaCove Nerd Font
font_size        11.0
font_size_bold   11.0
font_size_italic 11.0
font_size_bold_italic 11.0
enable_ligatures yes

# Color settings
foreground_color #cdd6f4
background_color #0f0f17

# Regular colors
color0  #3b3f51
color1  #f38ba8
color2  #a6e3a1
color3  #f9e2af
color4  #89b4fa
color5  #f5c2e7
color6  #94e2d5
color7  #cdd6f4

# Bright colors
color8  #6c7086
color9  #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #f5c2e7
color14 #94e2d5
color15 #e5e9f0

# Selection colors
selection_foreground #cdd6f4
selection_background #2e2e3e

# Search box colors (not directly supported in Kitty, but you can use them in other contexts)
# You can set these colors when needed in specific themes or commands
search_no_match_background #0f0f17
search_no_match_foreground #f38ba8
search_match_background #2e2e3e
search_match_foreground #cdd6f4

# URL colors
url_color #89b4fa
