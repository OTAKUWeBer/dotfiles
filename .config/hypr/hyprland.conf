
###################
### MY PROGRAMS ###
###################

$confDir = ~/dotfiles/.config/hypr/config.d


# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = thunar
$menu = bemenu-run
$mainMod = SUPER


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = nm-applet &
exec-once = waybar
exec-once = swaybg -i ~/assets/wallpapers/static/street-tn.png
exec-once = wl-clip-persist --clipboard regular
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

source = $confDir/display.conf
source = $confDir/input.conf
source = $confDir/keybinds.conf
source = $confDir/looks.conf
source = $confDir/wallpaper.conf
source = $confDir/window.conf